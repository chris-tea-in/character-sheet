<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&D 5e Character Sheet</title>
    <!-- Desktop tab icon. Browsers read the manifest icons only for an installed PWA,
         never for the tab, so without this the tab falls back to a blank page glyph.
         The .ico holds 16/32/48 cropped tighter than the app icon to stay legible. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <!-- iOS home-screen (Add to Home Screen) — Safari ignores the web manifest icons,
         so it needs an explicit apple-touch-icon. Android/Chrome uses the manifest. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DnD Sheet" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
